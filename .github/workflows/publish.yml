# Publish wp2shell-detect to PyPI on tag push, via PyPI Trusted Publishing (OIDC).
#
# No API token is stored in this repository: PyPI mints a short-lived OIDC token
# for this exact workflow at publish time.
#
# ONE-TIME SETUP on PyPI before the first release (https://pypi.org/manage/account/publishing/):
#   Add a "pending publisher" (the project does not need to exist yet):
#     - PyPI Project Name : wp2shell-detect
#     - Owner             : own2pwn-fr
#     - Repository name   : wp2shell-detect
#     - Workflow name     : publish.yml
#     - Environment name  : pypi
#   Then create a GitHub Environment named `pypi` in the repo settings.
#
# Release flow:
#   git tag v1.0.0 && git push origin v1.0.0
# (the tag version should match `version` in pyproject.toml)

name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install build backend
        run: python -m pip install --upgrade build
      - name: Build sdist and wheel
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/wp2shell-detect
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
