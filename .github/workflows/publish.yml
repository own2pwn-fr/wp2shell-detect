# Publish wp2shell-detect to PyPI on tag push, using a PyPI API token.
#
# SETUP (one-time): store the PyPI API token as a repository secret named
# PYPI_API_TOKEN (Settings > Secrets and variables > Actions), or:
#   gh secret set PYPI_API_TOKEN --repo own2pwn-fr/wp2shell-detect
#
# Release flow:
#   git tag v1.2.3 && git push origin v1.2.3
# (the tag version should match `version` in pyproject.toml)
#
# `skip-existing: true` makes re-runs safe: if the version is already on PyPI
# (e.g. published manually), the workflow skips it instead of failing.

name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
